- name: Install dependencies of jits-meet and of this role
  ansible.builtin.apt:
    pkg:
      - apt-transport-https # https deb repos
      - debconf # for jitsi configuration
      - debconf-utils # for jitsi configuration
    state: present
    update_cache: true
- name: Add jitsi's apt repo
  ansible.builtin.include_role:
    name: hax0rbana_adam.apt_repo
  vars:
    apt_repo_url: https://download.jitsi.org
    apt_repo_key_url: https://download.jitsi.org/jitsi-key.gpg.key
    apt_repo_key_checksum: sha256:eb21b1cdcc04594be092ce2973e1989b145bacac4dff6e7eb6e847ad866c3f96
    apt_repo_key_filename: jitsi-key.asc
    apt_repo_codename: "stable/"
    apt_repo_components: []
    apt_repo_pinning:
      filename: jitsi
      origin: download.jitsi.org
      packages:
        - jicofo
        - jitsi-meet
        - jitsi-meet-prosody
        - jitsi-meet-web
        - jitsi-meet-web-config
        - jitsi-videobridge
        - jitsi-videobridge2
- name: Add Jitsi Repository Signing Key
  ansible.builtin.apt_key:
    id: 66A9CD0595D6AFA247290D3BEF8B479E2DC1389C
    url: https://download.jitsi.org/jitsi-key.gpg.key
    state: present
- name: Add Jitsi Repository
  ansible.builtin.apt_repository:
    repo: deb https://download.jitsi.org stable/
    state: present
    filename: jitsi
    update_cache: true

- name: Get public IP
  when: jitsi_nat|bool
  community.general.ipify_facts: {}

# The packages and the order is determined by running
# apt-get --dry-run install jitsi-meet

- name: Pre-configure jitsi-videobridge package
  ansible.builtin.debconf:
    name: jitsi-videobridge2
    question: jitsi-videobridge2/jvb-hostname
    value: "{{ jitsi_domain }}"
    vtype: string
- name: Install jitsi-videobridge
  ansible.builtin.apt:
    name: jitsi-videobridge2
    state: present
- name: Port 4443 for jitsi-videobridge
  ansible.builtin.template:
    src: sip-communicator.properties.j2
    dest: /etc/jitsi/videobridge/sip-communicator.properties
    mode: "644"
  register: jitsi_videobridge_sip_communicator
- name: Restart jitsi-videobridge
  when: jitsi_videobridge_sip_communicator.changed # noqa no-handler
  ansible.builtin.service:
    name: jitsi-videobridge
    state: restarted

- name: Install jicofo
  ansible.builtin.apt:
    name: jicofo
    state: present

- name: Install jitsi-meet-web
  ansible.builtin.apt:
    name: jitsi-meet-web
    state: present
- name: Pre-configure jitsi-meet-web-config package
  ansible.builtin.debconf:
    name: jitsi-meet-web-config
    question: jitsi-meet/cert-choice
    value: Generate a new self-signed certificate (You will later get a chance to obtain a Let's encrypt certificate)
    vtype: select
- name: Install jitsi-meet-web-config
  ansible.builtin.apt:
    name: jitsi-meet-web-config
    state: present
- name: Install jitsi-meet-prosody
  ansible.builtin.apt:
    name: jitsi-meet-prosody
    state: present

- name: Install jitsi-meet
  ansible.builtin.apt:
    name: jitsi-meet
    state: present
